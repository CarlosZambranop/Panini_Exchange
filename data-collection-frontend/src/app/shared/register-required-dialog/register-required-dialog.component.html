<h2 mat-dialog-title>Registro requerido</h2>
<div mat-dialog-content>
  <p>Para solicitar un intercambio debes registrarte primero. Este sitio es un proyecto educativo y no realiza intercambios reales.</p>
</div>
<div mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Cancelar</button>
  <button mat-flat-button color="primary" type="button" (click)="register()">Registrarme</button>
</div>
