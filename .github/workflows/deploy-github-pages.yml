name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'data-collection-frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./data-collection-frontend
        run: npm ci

      - name: Build Angular application
        working-directory: ./data-collection-frontend
        run: npm run build

      - name: Create .nojekyll file
        run: touch data-collection-frontend/dist/data-collection-frontend/browser/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'data-collection-frontend/dist/data-collection-frontend/browser'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3
